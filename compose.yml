# https://www.rplumber.io/articles/hosting.html

name: tfm-r-server
services:
  r-plumber:
    build: .
    #command: /api/start.R
    env_file:
      - .env
    volumes:
      - ./api:/api
      - ./TFM-R:/r
    environment:
      apikey: ${SUPABASE_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway" # allows R to access host services (e.g., database) via host.docker.internal
    restart: unless-stopped
    ports:
      - "7005:7005"

  # Background worker: listens for pg_notify and triggers derived calculations
  r-derived-listener:
    build: .
    command: ["Rscript", "/r/api/pg_notify_listener.R"]
    env_file:
      - .env
    volumes:
      - ./TFM-R:/r
    environment:
      apikey: ${SUPABASE_KEY}
      R_API_BASE: http://r-plumber:7005
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - supabase-net # reach supabase-db:5432 directly (no host port mapping needed)
    restart: unless-stopped
    depends_on:
      - r-plumber

networks:
  supabase-net:
    external: true
    name: tfm-server_supabase-net # Docker Compose v2 lowercases project names; `name: TFM-Server` → tfm-server
