# https://www.rplumber.io/articles/hosting.html

name: tfm-r-server
services:
  r-plumber:
    build: .
    #command: /api/start.R
    env_file:
      - .env
    volumes:
      - ./api:/api
      - ./TFM-R:/r
    environment:
      apikey: ${SUPABASE_KEY}
      SUPABASE_URL: http://kong:8000 # use internal Docker network, not host-mapped port
      SUPABASE_PG_HOST: supabase-db
      SUPABASE_PG_PORT: "5432"
    extra_hosts:
      - "host.docker.internal:host-gateway" # allows R to access host services (e.g., database) via host.docker.internal
    networks:
      - default
      - supabase-net # reach kong:8000 and supabase-db:5432 directly
    restart: unless-stopped
    ports:
      - "7005:7005"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

  # Background worker: listens for pg_notify and triggers derived calculations
  r-derived-listener:
    build: .
    command: ["Rscript", "/r/api/pg_notify_listener.R"]
    env_file:
      - .env
    volumes:
      - ./TFM-R:/r
    environment:
      apikey: ${SUPABASE_KEY}
      R_API_BASE: http://r-plumber:7005
      SUPABASE_PG_HOST: supabase-db # always use direct Docker network, not host
      SUPABASE_PG_PORT: "5432"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - supabase-net # reach supabase-db:5432 directly (no host port mapping needed)
    restart: unless-stopped
    depends_on:
      - r-plumber
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"

networks:
  supabase-net:
    external: true
    name: tfm-server_supabase-net # Docker Compose v2 lowercases project names; `name: TFM-Server` → tfm-server
