# https://www.rplumber.io/articles/hosting.html

name: tfm-r-server
services:
  r-plumber:
    build: .
    #command: /api/start.R
    volumes:
      - ./api:/api
      - ./TFM-R:/r
      - ./.env:/.env
    environment:
      #SUPABASE_URL: http://host.docker.internal:54321
      apikey: ${SUPABASE_KEY}
      #HOST_DOCKER_INTERNAL: host.docker.internal
    restart: unless-stopped
    ports:
      - "7005:7005"

  # Background worker: listens for pg_notify and triggers derived calculations
  r-derived-listener:
    build: .
    command: ["Rscript", "/r/api/pg_notify_listener.R"]
    volumes:
      - ./TFM-R:/r
      - ./.env:/.env
    environment:
      apikey: ${SUPABASE_KEY}
      R_API_BASE: http://r-plumber:7005
    restart: unless-stopped
    depends_on:
      - r-plumber
