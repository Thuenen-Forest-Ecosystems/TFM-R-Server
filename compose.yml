# https://www.rplumber.io/articles/hosting.html

name: tfm-r-server
services:
  r-plumber:
    build: .
    #command: /api/start.R
    volumes:
      - ./api:/api
      - ./TFM-R:/r
      - ./.env:/.env
    environment:
      #SUPABASE_URL: http://host.docker.internal:54321
      apikey: ${SUPABASE_KEY}
      #HOST_DOCKER_INTERNAL: host.docker.internal
    restart: unless-stopped
    ports:
     - "7005:7005"